{% extends "base.html" %}

{% block title %}Login - Fluvial System{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-4 col-lg-3">
        <div class="card shadow-lg border-0 rounded-3">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-ferry fa-4x text-primary mb-3"></i>
                    <h3 class="fw-bold text-primary">Fluvial System</h3>
                    <p class="text-muted">Sistema de Travessia</p>
                </div>
                
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="lembrar" name="lembrar">
                        <label class="form-check-label" for="lembrar">Lembrar-me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>
                
                <div class="mt-4 text-center">
                    <small class="text-muted">
                        Demo: admin@fluvial.com / admin123
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
